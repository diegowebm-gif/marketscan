<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — MarketScan</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7; --surface: #ffffff; --surface2: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --accent: #6a0dad; --accent-dim: rgba(106,13,173,0.08);
  --danger: #d32f2f; --danger-dim: rgba(211,47,47,0.08);
  --success: #16a34a; --success-dim: rgba(22,163,74,0.08);
  --text: #1a1a2e; --text2: #6b7280; --text3: #9ca3af;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); box-shadow: var(--shadow);
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent); }

.container {
  max-width: 560px; margin: 3rem auto; padding: 0 1.5rem;
}

.card {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow-md); border: 1px solid var(--border);
  padding: 2rem;
}

h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: .5rem; }
.subtitle { font-size: 14px; color: var(--text2); margin-bottom: 2rem; line-height: 1.5; }

label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; font-weight: 500; }
input, select, textarea {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border2); background: var(--surface);
  font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text);
  outline: none; transition: border-color .2s; margin-bottom: 14px;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
textarea { resize: vertical; min-height: 120px; }

.btn-submit {
  width: 100%; padding: 13px; border-radius: var(--radius-sm);
  border: none; background: var(--accent); color: #fff;
  font-weight: 700; font-size: 15px; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all .2s;
}
.btn-submit:hover { opacity: .9; transform: translateY(-1px); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.success-msg {
  display: none; background: var(--success-dim); color: var(--success);
  border: 1px solid rgba(22,163,74,0.2); border-radius: var(--radius-sm);
  padding: 1rem; font-size: 14px; text-align: center; margin-bottom: 1rem;
}
.error-msg {
  display: none; background: var(--danger-dim); color: var(--danger);
  border: 1px solid rgba(211,47,47,0.2); border-radius: var(--radius-sm);
  padding: 1rem; font-size: 14px; margin-bottom: 1rem;
}

.whatsapp-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px; border-radius: var(--radius-sm);
  border: 1.5px solid #25d366; background: transparent; color: #16a34a;
  font-weight: 600; font-size: 14px; font-family: 'Inter', sans-serif;
  cursor: pointer; text-decoration: none; margin-top: 12px; transition: all .2s;
}
.whatsapp-btn:hover { background: rgba(37,211,102,0.08); }

.divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; }
.divider span { font-size: 12px; color: var(--text3); white-space: nowrap; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

footer { text-align: center; padding: 2rem; font-size: 11px; color: var(--text3); }
footer a { color: var(--text3); text-decoration: none; }
footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <a href="/app" class="logo">Market<span>Scan</span></a>
  <a href="/app" style="font-size:13px;color:var(--text2);text-decoration:none">← Voltar ao app</a>
</header>

<div class="container">
  <div class="card">
    <h1>Fale conosco</h1>
    <p class="subtitle">Dúvidas, sugestões ou problemas? Preencha o formulário e respondemos em até 24h.</p>

    <div class="success-msg" id="success-msg">✅ Mensagem enviada! Responderemos em breve.</div>
    <div class="error-msg" id="error-msg">❌ Erro ao enviar. Tente novamente ou nos chame no WhatsApp.</div>

    <form id="contact-form" onsubmit="sendContact(event)">
      <label>Seu nome</label>
      <input type="text" id="contact-name" placeholder="Como podemos te chamar?" required />

      <label>Seu e-mail</label>
      <input type="email" id="contact-email" placeholder="seu@email.com" required />

      <label>Assunto</label>
      <select id="contact-subject">
        <option value="suporte">Problema técnico</option>
        <option value="duvida">Dúvida sobre o produto</option>
        <option value="sugestao">Sugestão de melhoria</option>
        <option value="cidade">Cidade não encontrada</option>
        <option value="cobranca">Dúvida sobre cobrança</option>
        <option value="outro">Outro</option>
      </select>

      <label>Mensagem</label>
      <textarea id="contact-message" placeholder="Descreva sua dúvida ou problema em detalhes..." required></textarea>

      <button type="submit" class="btn-submit" id="btn-submit">Enviar mensagem</button>
    </form>

    <div class="divider"><span>ou</span></div>

    <a href="https://wa.me/5548991846246?text=Olá!%20Preciso%20de%20ajuda%20com%20o%20MarketScan." target="_blank" class="whatsapp-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Chamar no WhatsApp
    </a>
  </div>
</div>

<footer>
  <a href="/app">Voltar ao app</a> · <a href="/terms.html">Termos de uso</a> · © 2026 MarketScan
</footer>

<script>
async function sendContact(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Enviando...';
  document.getElementById('success-msg').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  const name = document.getElementById('contact-name').value;
  const email = document.getElementById('contact-email').value;
  const subject = document.getElementById('contact-subject').value;
  const message = document.getElementById('contact-message').value;

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, subject, message })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('contact-form').reset();
    } else throw new Error(data.error);
  } catch {
    document.getElementById('error-msg').style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Enviar mensagem';
}
</script>
</body>
</html>
