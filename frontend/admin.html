<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — MarketScan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7; --surface: #ffffff; --surface2: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --accent: #6a0dad; --accent-dim: rgba(106,13,173,0.08);
  --danger: #d32f2f; --danger-dim: rgba(211,47,47,0.08);
  --success: #16a34a; --success-dim: rgba(22,163,74,0.08);
  --text: #1a1a2e; --text2: #6b7280; --text3: #9ca3af;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); box-shadow: var(--shadow);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; }
.logo span { color: var(--accent); }
.logo small { font-size: 11px; font-weight: 400; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }

.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 2rem; }
.stat-card { background: var(--surface); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
.stat-value.purple { color: var(--accent); }
.stat-value.green { color: var(--success); }
.stat-value.gray { color: var(--text2); }

.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; margin-bottom: 1.5rem; }
.card-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-weight: 700; font-size: 15px; }

.search-bar { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
.search-bar input { width: 100%; max-width: 360px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
.search-bar input:focus { border-color: var(--accent); }

table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; background: var(--surface2); border-bottom: 1px solid var(--border); }
td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

.badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.badge.pro { background: linear-gradient(135deg,#7c3aed,#4f46e5); color: #fff; }
.badge.free { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }

.btn { padding: 6px 14px; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
.btn-pro { background: linear-gradient(135deg,#7c3aed,#4f46e5); color: #fff; }
.btn-pro:hover { opacity: .85; }
.btn-revoke { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(211,47,47,0.2); }
.btn-revoke:hover { background: var(--danger); color: #fff; }
.btn-delete { background: #fff0f0; color: #b91c1c; border: 1px solid rgba(185,28,28,0.2); margin-left: 4px; }
.btn-delete:hover { background: #b91c1c; color: #fff; }
.btn-refresh { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-dim); }
.btn-refresh:hover { background: var(--accent); color: #fff; }

#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 1rem; }
.login-box { background: var(--surface); border-radius: var(--radius); padding: 2rem; max-width: 360px; width: 90%; box-shadow: var(--shadow-md); }
.login-box h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; margin-bottom: 1rem; }
.login-box input { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; margin-bottom: 10px; }
.login-box input:focus { border-color: var(--accent); }
.login-box button { width: 100%; padding: 11px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; font-weight: 700; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer; }
.login-error { font-size: 12px; color: var(--danger); background: var(--danger-dim); padding: 8px 12px; border-radius: var(--radius-sm); display: none; }
.login-error.show { display: block; }

#admin-screen { display: none; }

.alert-pool { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
.alert-pool:last-child { border-bottom: none; }
.alert-pool .info { flex: 1; }
.alert-pool .info strong { font-size: 13px; display: block; }
.alert-pool .info span { font-size: 11px; color: var(--text2); }
.badge-2fa { background: #fef3c7; color: #92400e; }
.badge-blocked { background: #fee2e2; color: #b91c1c; }
#toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border-radius: var(--radius); padding: .8rem 1.2rem; font-size: 13px; transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; box-shadow: var(--shadow-md); }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { background: #f0fdf4; color: #15803d; }
#toast.error { background: #fef2f2; color: #b91c1c; }

.empty { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">Market<span>Scan</span> <small>ADMIN</small></div>
  <button class="btn btn-refresh" id="btn-logout" style="display:none" onclick="logout()">Sair</button>
</header>

<div id="login-screen">
  <div class="login-box">
    <h2>🔐 Painel Admin</h2>
    <input type="email" id="admin-email" placeholder="Seu e-mail" />
    <input type="password" id="admin-password" placeholder="Sua senha" />
    <div class="login-error" id="login-error"></div>
    <button onclick="doAdminLogin()">Entrar</button>
  </div>
</div>

<div id="admin-screen">
  <div class="container">

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total de usuários</div><div class="stat-value purple" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Plano Pro</div><div class="stat-value green" id="stat-pro">—</div></div>
      <div class="stat-card"><div class="stat-label">Plano Free</div><div class="stat-value gray" id="stat-free">—</div></div>
      <div class="stat-card"><div class="stat-label">Novos hoje</div><div class="stat-value purple" id="stat-today">—</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">👥 Usuários</span>
        <button class="btn btn-refresh" onclick="loadUsers()">↻ Atualizar</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar por e-mail..." oninput="filterUsers()" />
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>E-mail</th>
              <th>Plano</th>
              <th>Cadastro</th>
              <th>Vencimento Pro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="users-table">
            <tr><td colspan="5" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

    <!-- Card alertas do pool -->
    <div class="card" id="pool-alerts-card" style="display:none">
      <div class="card-header">
        <span class="card-title">⚠️ Alertas do Pool de Contas</span>
        <button class="btn btn-refresh" onclick="loadPoolAlerts()">↻ Atualizar</button>
      </div>
      <div id="pool-alerts-list">
        <div class="empty">Nenhum alerta.</div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const ADMIN_EMAIL = 'diegowebm@gmail.com';
let authToken = localStorage.getItem('admin_token');
let allUsers = [];

window.onload = async () => {
  if (authToken) {
    const res = await api('GET', '/api/auth/me');
    if (res?.ok && res.email === ADMIN_EMAIL) {
      showAdmin();
      return;
    }
    localStorage.removeItem('admin_token');
    authToken = null;
  }
};

async function doAdminLogin() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');

  if (email !== ADMIN_EMAIL) {
    errEl.textContent = 'Acesso não autorizado.';
    errEl.classList.add('show');
    return;
  }

  const res = await api('POST', '/api/auth/login', { email, password });
  if (!res?.ok) {
    errEl.textContent = res?.error || 'Erro ao entrar.';
    errEl.classList.add('show');
    return;
  }

  authToken = res.token;
  localStorage.setItem('admin_token', authToken);
  showAdmin();
}

function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  document.getElementById('btn-logout').style.display = 'inline-block';
  loadUsers();
  loadPoolAlerts();
}

function logout() {
  localStorage.removeItem('admin_token');
  authToken = null;
  location.reload();
}

async function loadUsers() {
  const res = await api('GET', '/api/admin/users');
  if (!res?.ok) { toast('Erro ao carregar usuários', 'error'); return; }

  allUsers = res.users;
  renderStats(allUsers);
  renderUsers(allUsers);
}

function renderStats(users) {
  const total = users.length;
  const pro = users.filter(u => u.plan === 'pro').length;
  const free = total - pro;
  const today = users.filter(u => {
    const d = new Date(parseInt(u.created_at) * 1000);
    const now = new Date();
    return d.toDateString() === now.toDateString();
  }).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pro').textContent = pro;
  document.getElementById('stat-free').textContent = free;
  document.getElementById('stat-today').textContent = today;
}

function renderUsers(users) {
  const tbody = document.getElementById('users-table');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Nenhum usuário encontrado.</td></tr>';
    return;
  }

  tbody.innerHTML = users.map(u => {
    const createdAt = u.created_at ? new Date(parseInt(u.created_at) * 1000).toLocaleDateString('pt-BR') : '—';
    const expiresAt = u.plan_expires_at ? new Date(parseInt(u.plan_expires_at)).toLocaleDateString('pt-BR') : '—';
    const isPro = u.plan === 'pro';

    const actionBtn = isPro
      ? `<button class="btn btn-revoke" onclick="revokeUser('${u.token}', '${u.email}')">Revogar Pro</button>`
      : `<button class="btn btn-pro" onclick="grantUser('${u.token}', '${u.email}')">Dar Pro</button>`;

    return `<tr>
      <td><strong>${esc(u.email)}</strong></td>
      <td><span class="badge ${u.plan}">${u.plan.toUpperCase()}</span></td>
      <td>${createdAt}</td>
      <td>${isPro ? expiresAt : '—'}</td>
      <td style="white-space:nowrap">${actionBtn}<button class="btn btn-delete" onclick="deleteUser('${u.token}', '${u.email}')">🗑 Excluir</button></td>
    </tr>`;
  }).join('');
}

function filterUsers() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allUsers.filter(u => u.email.toLowerCase().includes(q));
  renderUsers(filtered);
}

async function grantUser(token, email) {
  if (!confirm(`Dar plano Pro para ${email}?`)) return;
  const res = await api('POST', '/api/admin/grant-pro', { token, months: 1 });
  if (res?.ok) { toast(`✅ Pro ativado para ${email}`, 'success'); loadUsers(); }
  else toast('Erro: ' + (res?.error || ''), 'error');
}

async function revokeUser(token, email) {
  if (!confirm(`Revogar plano Pro de ${email}?`)) return;
  const res = await api('POST', '/api/admin/revoke-pro', { token });
  if (res?.ok) { toast(`✅ Pro revogado de ${email}`, 'success'); loadUsers(); }
  else toast('Erro: ' + (res?.error || ''), 'error');
}

async function loadPoolAlerts() {
  const res = await api('GET', '/api/admin/pool-alerts');
  if (!res?.ok) return;
  const card = document.getElementById('pool-alerts-card');
  const list = document.getElementById('pool-alerts-list');
  if (!res.alerts.length) {
    card.style.display = 'none';
    return;
  }
  card.style.display = 'block';
  list.innerHTML = res.alerts.map(a => {
    const date = new Date(parseInt(a.created_at)).toLocaleString('pt-BR');
    const badgeClass = a.status === 'needs_2fa' ? 'badge-2fa' : 'badge-blocked';
    const badgeText = a.status === 'needs_2fa' ? '2FA solicitado' : 'Conta bloqueada';
    return `<div class="alert-pool">
      <div class="info">
        <strong>${esc(a.email)}</strong>
        <span>${date}</span>
      </div>
      <span class="badge ${badgeClass}">${badgeText}</span>
      <button class="btn btn-revoke" onclick="dismissAlert(${a.id})">Dispensar</button>
    </div>`;
  }).join('');
}

async function dismissAlert(id) {
  await api('DELETE', `/api/admin/pool-alerts/${id}`);
  loadPoolAlerts();
  toast('Alerta dispensado', 'success');
}

async function deleteUser(token, email) {
  if (!confirm(`⚠️ Excluir permanentemente o usuário ${email}?\nEssa ação não pode ser desfeita.`)) return;
  const res = await api('DELETE', `/api/admin/users/${token}`);
  if (res?.ok) { toast(`✅ Usuário ${email} excluído`, 'success'); loadUsers(); }
  else toast('Erro: ' + (res?.error || ''), 'error');
}

async function api(method, url, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (authToken) opts.headers['x-auth-token'] = authToken;
    if (body) opts.body = JSON.stringify(body);
    return await (await fetch(url, opts)).json();
  } catch { return null; }
}

function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}
</script>
</body>
</html>
